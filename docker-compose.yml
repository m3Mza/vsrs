services:
  mysql:
    image: mysql:8.0
    container_name: creativeagency_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: creativeagency_db
      MYSQL_USER: agency_user
      MYSQL_PASSWORD: agency_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agency_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: creativeagency_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - agency_network

volumes:
  mysql_data:

networks:
  agency_network:
    driver: bridge
